services:
  postgres:
    image: postgres:16-alpine
    container_name: rzd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-rzd}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mysecretpassword}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rzd-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rzd-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      BOT_NAME: ${BOT_NAME:-rzd_check_seat_bot}
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN is required}
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-rzd}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-mysecretpassword}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
