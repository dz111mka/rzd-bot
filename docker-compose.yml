version: '3.7'
services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mysecretpassword}
      POSTGRES_DB: rzd
    volumes:
      - rzd:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d rzd" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rzd:
    build: .
    ports:
      - 8080:8080
      - 9010:9010
    environment:
      SPRING_PROFILES_ACTIVE: dockercompose
      DB_URL: jdbc:postgresql://postgres:5432/rzd
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-mysecretpassword}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

volumes:
  rzd: