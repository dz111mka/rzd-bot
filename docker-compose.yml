version: '3.7'
services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: rzd
    volumes:
      - rzd:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d rzd" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  rzd:
    build: .
    ports:
      - 8080:8080
      - 9010:9010
    environment:
      SPRING_PROFILES_ACTIVE: dockercompose
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: '256M'
        reservations:
          memory: '128M'
volumes:
  rzd:
