bot:
  name: ${BOT_NAME:rzd_check_seat_bot}
  token: ${BOT_TOKEN}

spring:
  application:
    name: rzdbot
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rzd}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:mysecretpassword}
    hikari:
      schema: rzd
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS ${spring.datasource.hikari.schema}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/changelog-master.yml